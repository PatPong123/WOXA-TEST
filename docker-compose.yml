version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    # ✅ เพิ่มส่วนนี้เข้าไป
    extra_hosts:
      - "localhost:host-gateway" 
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    # ✅ เพิ่มส่วนนี้เข้าไปด้วยเพื่อให้ Backend คุยกับ DB ผ่าน localhost ได้ (ถ้าจำเป็น)
    extra_hosts:
      - "localhost:host-gateway"
    restart: always 
    volumes:
      - ./BACK-END:/app
      - /app/node_modules 
    environment:
      - DATABASE_URL=file:./prisma/dev.db